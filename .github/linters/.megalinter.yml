---
# Configuration file for MegaLinter
# See all available variables at https://megalinter.io/latest/config-file/ and in linters documentation

DISABLE:
  - PYTHON
  - SPELL
DISABLE_ERRORS_LINTERS:
  - COPYPASTE_JSCPD

FLAVOR_SUGGESTIONS: false
GITHUB_COMMENT_REPORTER: true
SECURITY_SUGGESTIONS: false
SHOW_ELAPSED_TIME: true
VALIDATE_ALL_CODEBASE: true

ANSIBLE_ANSIBLE_LINT_CONFIG_FILE: .github/linters/.ansible-lint.yml
ANSIBLE_ANSIBLE_LINT_PRE_COMMANDS:
  - command: ansible-galaxy collection install --requirements-file ./deployment/ansible/requirements.yml
    cwd: "workspace"
    run_before_linters: true
ANSIBLE_ANSIBLE_LINT_ARGUMENTS:
  - --exclude
  - github_conf
BASH_SHFMT_ARGUMENTS: --indent=4 --space-redirects
MARKDOWN_MARKDOWNLINT_FILTER_REGEX_EXCLUDE: (^\.github/PULL_REQUEST_TEMPLATE\.md$)
REPOSITORY_CHECKOV_CONFIG_FILE: .github/linters/.checkov.yml
REPOSITORY_TRIVY_ARGUMENTS: --ignorefile .github/linters/.trivyignore.yaml
YAML_V8R_CONFIG_FILE: .github/linters/.v8rrc.yml
YAML_YAMLLINT_ARGUMENTS: --strict
