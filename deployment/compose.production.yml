---
services:
  lnkr-api:
    image: ghcr.io/daniel-mizsak/lnkr-api:latest
    networks:
      - traefik
      - postgres
      - redis
    volumes:
      - "/deploy/applications/${APPLICATION_NAME}/geoip:/app/geoip:ro"
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.lnkr-api.loadbalancer.server.port=8000"

        - "traefik.http.routers.lnkr-general.rule=Host(`api.lnkr.by`)"
        - "traefik.http.routers.lnkr-general.entrypoints=websecure"
        - "traefik.http.routers.lnkr-general.priority=10"
        - "traefik.http.routers.lnkr-general.middlewares=lnkr-general-ratelimit@file"

        - "traefik.http.routers.lnkr-auth.rule=Host(`api.lnkr.by`) && PathPrefix(`/v1/auth`)"
        - "traefik.http.routers.lnkr-auth.entrypoints=websecure"
        - "traefik.http.routers.lnkr-auth.priority=20"
        - "traefik.http.routers.lnkr-auth.middlewares=lnkr-auth-ratelimit@file"

        - "traefik.http.routers.lnkr-forward-unlock.rule=Host(`api.lnkr.by`) && PathRegexp(`^/v1/forward/[^/]+/unlock$`) && Method(`POST`)"
        - "traefik.http.routers.lnkr-forward-unlock.entrypoints=websecure"
        - "traefik.http.routers.lnkr-forward-unlock.priority=20"
        - "traefik.http.routers.lnkr-forward-unlock.middlewares=lnkr-forward-unlock-ratelimit@file"

      mode: replicated
      replicas: 3
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 10s
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        limits:
          cpus: "0.25"
          memory: 1G

    environment:
      ENVIRONMENT: "${ENVIRONMENT}"
      ACCESS_TOKEN_SECRET_KEY: "${ACCESS_TOKEN_SECRET_KEY}"
      FRONTEND_API_KEY: "${FRONTEND_API_KEY}"
      SENTRY_DSN: "${SENTRY_DSN}"

      POSTGRES_HOST: "${POSTGRES_HOST}"
      POSTGRES_PORT: "${POSTGRES_PORT}"
      POSTGRES_USERNAME: "${APPLICATION_NAME}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DATABASE: "${APPLICATION_NAME}"

      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      REDIS_USERNAME: "${REDIS_USERNAME}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      REDIS_DATABASE_APPLICATION: "${REDIS_DATABASE_APPLICATION}"

      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"

networks:
  traefik:
    external: true
  postgres:
    external: true
  redis:
    external: true
