---
- name: Create application directory
  ansible.builtin.file:
    path: /deploy/applications/{{ application_name }}
    owner: "{{ application_user_name }}"
    group: "{{ application_user_name }}"
    mode: "0755"
    state: directory

- name: Copy application to host
  ansible.builtin.copy:
    src: ./../compose.production.yml
    dest: /deploy/applications/{{ application_name }}/compose.yml
    owner: "{{ application_user_name }}"
    group: "{{ application_user_name }}"
    mode: "0644"

- name: Run database migrations
  community.docker.docker_container:
    name: "{{ application_name }}-database-migration"
    image: ghcr.io/daniel-mizsak/lnkr-api:latest
    command: ["bash", "scripts/run-database-migrations.sh"]
    pull: always
    detach: false
    cleanup: true
    restart_policy: "no"
    networks:
      - name: postgres
    env:
      POSTGRES_HOST: "{{ lookup('env', 'POSTGRES_HOST') }}"
      POSTGRES_PORT: "{{ lookup('env', 'POSTGRES_PORT') }}"
      POSTGRES_USERNAME: "{{ application_name }}"
      POSTGRES_PASSWORD: "{{ lookup('env', 'POSTGRES_PASSWORD') }}"
      POSTGRES_DATABASE: "{{ application_name }}"
  register: database_migration
  changed_when: "'[alembic.runtime.migration] Running upgrade' in database_migration.container.Output"

- name: Start application
  community.docker.docker_stack:
    name: "{{ application_name }}"
    compose:
      - /deploy/applications/{{ application_name }}/compose.yml
    state: present
  environment:
    APPLICATION_NAME: "{{ application_name }}"
    ENVIRONMENT: "{{ lookup('env', 'ENVIRONMENT') }}"
    ACCESS_TOKEN_SECRET_KEY: "{{ lookup('env', 'ACCESS_TOKEN_SECRET_KEY') }}"
    SENTRY_DSN: "{{ lookup('env', 'SENTRY_DSN') }}"

    POSTGRES_HOST: "{{ lookup('env', 'POSTGRES_HOST') }}"
    POSTGRES_PORT: "{{ lookup('env', 'POSTGRES_PORT') }}"
    POSTGRES_PASSWORD: "{{ lookup('env', 'POSTGRES_PASSWORD') }}"

    REDIS_HOST: "{{ lookup('env', 'REDIS_HOST') }}"
    REDIS_PORT: "{{ lookup('env', 'REDIS_PORT') }}"
    REDIS_USERNAME: "{{ lookup('env', 'REDIS_USERNAME') }}"
    REDIS_PASSWORD: "{{ lookup('env', 'REDIS_PASSWORD') }}"
    REDIS_DATABASE_APPLICATION: "{{ lookup('env', 'REDIS_DATABASE_APPLICATION') }}"

    SMTP_HOST: "{{ lookup('env', 'SMTP_HOST') }}"
    SMTP_PORT: "{{ lookup('env', 'SMTP_PORT') }}"
    SMTP_USER: "{{ lookup('env', 'SMTP_USER') }}"
    SMTP_PASSWORD: "{{ lookup('env', 'SMTP_PASSWORD') }}"
