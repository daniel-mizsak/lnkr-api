---
services:
  postgres:
    image: "${POSTGRES_IMAGE}"
    container_name: postgres
    restart: unless-stopped
    networks:
      - postgres
    healthcheck:
      test: ["CMD", "pg_isready", "--username=postgres"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    user: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    shm_size: "256mb"
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD_ROOT}"

volumes:
  postgres_data:

networks:
  postgres:
    external: true
