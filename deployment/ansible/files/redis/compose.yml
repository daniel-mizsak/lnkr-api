---
services:
  redis:
    image: "${REDIS_IMAGE}"
    container_name: redis
    restart: unless-stopped
    networks:
      - redis
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/etc/redis/redis.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 512M
    command:
      - redis-server
      - /etc/redis/redis.conf
      - --requirepass
      - "${REDIS_PASSWORD}"
    # TODO: Use redis.conf for setting the password.
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"

volumes:
  redis_data:

networks:
  redis:
    external: true
